# Production OpenFn Lightning stack for air-gapped deployment.
# Image versions here are the single source of truth for build-bundle.sh.

services:
  postgres:
    image: postgres:15.12-alpine
    restart: unless-stopped
    stop_grace_period: 3s
    env_file:
      - secrets/.env
    deploy:
      resources:
        limits:
          memory: 1024M
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER"']
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: openfn/lightning:v2.16.6
    restart: unless-stopped
    stop_grace_period: 3s
    env_file:
      - secrets/.env
      - config.env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3072M
    ports:
      - '${LIGHTNING_EXTERNAL_PORT:-0.0.0.0:4000:4000}'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4000/health_check || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10

  worker:
    image: openfn/ws-worker:latest
    restart: unless-stopped
    stop_grace_period: 3s
    env_file:
      - secrets/.env
      - config.env
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
    command: ['pnpm', 'start:prod', '-l', 'ws://web:4000/worker']
    expose:
      - '2222'
